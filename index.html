<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 云喵圈子 — 铲屎官的快乐老家</title>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #fef7f2;
      color: #4a3728;
      line-height: 1.6;
      overflow-x: hidden;
    }
    :root { --pink: #f7a1b5; --pink-dark: #e8829a; --cream: #fff5ee; --brown: #6b4c3b; --brown-light: #9c7c6a; --card-shadow: 0 4px 20px rgba(247,161,181,0.20); --radius: 16px; }
    .floating-cats { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .floating-cats span { position: absolute; font-size: 3rem; opacity: 0.08; animation: floatCat 20s ease-in-out infinite; }
    .floating-cats span:nth-child(1) { top:10%; left:5%; animation-delay:0s; }
    .floating-cats span:nth-child(2) { top:40%; right:8%; animation-delay:-5s; font-size:4rem; }
    .floating-cats span:nth-child(3) { top:70%; left:12%; animation-delay:-10s; }
    .floating-cats span:nth-child(4) { bottom:15%; right:15%; animation-delay:-15s; font-size:3.5rem; }
    .floating-cats span:nth-child(5) { top:25%; left:60%; animation-delay:-7s; font-size:2.5rem; }
    .floating-cats span:nth-child(6) { bottom:30%; left:45%; animation-delay:-12s; }
    @keyframes floatCat { 0%,100%{transform:translateY(0)rotate(0deg)} 25%{transform:translateY(-20px)rotate(3deg)} 50%{transform:translateY(-10px)rotate(-2deg)} 75%{transform:translateY(-25px)rotate(2deg)} }
    .app-wrapper { position:relative; z-index:1; max-width:780px; margin:0 auto; padding:0 16px 100px; }
    header { padding:28px 0 12px; text-align:center; }
    header h1 { font-size:2rem; color:var(--brown); letter-spacing:2px; }
    header .subtitle { font-size:0.95rem; color:var(--brown-light); margin-top:4px; }
    header .cat-emoji-big { font-size:3.5rem; display:block; margin-bottom:4px; }
    .stats-bar { display:flex; justify-content:space-around; background:white; border-radius:var(--radius); padding:14px 8px; margin:16px 0 20px; box-shadow:var(--card-shadow); }
    .stats-bar .stat { text-align:center; flex:1; }
    .stats-bar .stat .num { font-size:1.3rem; font-weight:700; color:var(--pink-dark); }
    .stats-bar .stat .label { font-size:0.75rem; color:var(--brown-light); margin-top:2px; }
    .publish-box { background:white; border-radius:var(--radius); padding:16px; box-shadow:var(--card-shadow); margin-bottom:20px; }
    .publish-box .publish-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .publish-box .avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#f7a1b5,#ffd4a8); display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .publish-box textarea { flex:1; border:none; background:var(--cream); border-radius:12px; padding:10px 14px; font-size:0.9rem; resize:none; height:44px; font-family:inherit; color:var(--brown); outline:2px solid transparent; transition:outline 0.2s,height 0.2s; }
    .publish-box textarea:focus { outline:2px solid var(--pink); height:70px; }
    .publish-box textarea::placeholder { color:#c0a898; }
    .publish-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .publish-btn { background:linear-gradient(135deg,var(--pink),var(--pink-dark)); color:white; border:none; border-radius:20px; padding:8px 24px; font-size:0.9rem; cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; font-weight:600; }
    .publish-btn:hover { transform:scale(1.04); box-shadow:0 4px 12px rgba(247,161,181,0.4); }
    .publish-btn:active { transform:scale(0.96); }
    .tabs { display:flex; gap:4px; margin-bottom:16px; background:white; border-radius:var(--radius); padding:4px; box-shadow:var(--card-shadow); }
    .tabs button { flex:1; border:none; background:transparent; padding:10px 0; border-radius:12px; font-size:0.85rem; font-weight:600; color:var(--brown-light); cursor:pointer; transition:all 0.2s; }
    .tabs button.active { background:var(--pink); color:white; box-shadow:0 2px 8px rgba(247,161,181,0.3); }
    .tabs button:not(.active):hover { background:#f5e6dc; }
    .feed { display:flex; flex-direction:column; gap:16px; }
    .post-card { background:white; border-radius:var(--radius); padding:16px; box-shadow:var(--card-shadow); transition:transform 0.15s; }
    .post-card:hover { transform:translateY(-1px); }
    .post-card .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .post-card .post-avatar { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .post-card .post-author { font-weight:700; font-size:0.9rem; }
    .post-card .post-time { font-size:0.75rem; color:var(--brown-light); margin-left:auto; }
    .post-card .post-content { font-size:0.95rem; margin-bottom:8px; line-height:1.7; }
    .post-card .post-content .cat-emoji { font-size:1.1rem; }
    .post-card .post-actions { display:flex; gap:20px; padding-top:8px; border-top:1px solid #f5e6dc; }
    .post-card .post-actions button { background:none; border:none; cursor:pointer; font-size:0.85rem; color:var(--brown-light); display:flex; align-items:center; gap:4px; padding:4px 8px; border-radius:8px; transition:background 0.15s; }
    .post-card .post-actions button:hover { background:#f5e6dc; }
    .post-card .post-actions button.liked { color:var(--pink-dark); font-weight:600; }
    .post-card .post-actions button .icon { font-size:1.1rem; }
    .topic-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .topic-tag { background:white; border:1.5px solid #f0d5c8; border-radius:20px; padding:6px 14px; font-size:0.8rem; cursor:pointer; transition:all 0.15s; color:var(--brown); font-weight:500; }
    .topic-tag:hover, .topic-tag.active { background:var(--pink); color:white; border-color:var(--pink); }
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%)translateY(100px); background:var(--brown); color:white; padding:10px 24px; border-radius:30px; font-size:0.85rem; opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1); pointer-events:none; z-index:100; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%)translateY(0); }
    .loading-spinner { text-align:center; padding:30px; color:var(--brown-light); }
    .loading-spinner .spin { display:inline-block; animation:spin 1s linear infinite; font-size:1.5rem; }
    @keyframes spin { 100%{transform:rotate(360deg)} }
    @media (max-width:500px) { header h1 { font-size:1.6rem; } .floating-cats span { font-size:2rem!important; } .stats-bar .stat .num { font-size:1.1rem; } }
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--cream); }
    ::-webkit-scrollbar-thumb { background:var(--pink); border-radius:3px; }
    .nickname-input { display:flex; gap:8px; margin-bottom:10px; }
    .nickname-input input { flex:1; border:none; background:var(--cream); border-radius:12px; padding:8px 14px; font-size:0.85rem; font-family:inherit; color:var(--brown); outline:2px solid transparent; }
    .nickname-input input:focus { outline:2px solid var(--pink); }
    .nickname-input input::placeholder { color:#c0a898; }
    .delete-btn { background:none; border:none; cursor:pointer; font-size:0.8rem; color:#ccc; padding:2px 6px; border-radius:6px; transition:all 0.15s; margin-left:6px; flex-shrink:0; }
    .delete-btn:hover { color:#e8829a; background:#fef0f0; }
    .post-header-right { display:flex; align-items:center; margin-left:auto; }
  </style>
</head>
<body>
  <div class="floating-cats">
    <span>🐱</span><span>😸</span><span>😺</span><span>🐈</span><span>😻</span><span>🐾</span>
  </div>
  <div class="toast" id="toast"></div>
  <div class="app-wrapper">
    <header>
      <span class="cat-emoji-big">🐈</span>
      <h1>☁️ 云喵圈子</h1>
      <p class="subtitle">🐾 铲屎官的快乐老家 · 云吸猫第一站</p>
    </header>
    <div class="stats-bar">
      <div class="stat"><div class="num" id="memberCount">🐱</div><div class="label">喵友</div></div>
      <div class="stat"><div class="num" id="postCount">📝</div><div class="label">帖子</div></div>
      <div class="stat"><div class="num" id="miaoCount">😻</div><div class="label">今日喵喵</div></div>
      <div class="stat"><div class="num" id="catCount">🐾</div><div class="label">圈内喵星</div></div>
    </div>
    <div class="publish-box">
      <div class="nickname-input">
        <input id="nicknameInput" placeholder="你的喵名（可选，随机生成）" maxlength="10">
      </div>
      <div class="publish-header">
        <div class="avatar" id="myAvatar">😺</div>
        <textarea id="postInput" placeholder="分享你家主子的日常… 🐱"></textarea>
      </div>
      <div class="publish-actions">
        <div style="font-size:0.75rem;color:var(--brown-light)" id="publishStatus"></div>
        <button class="publish-btn" onclick="publishPost()">🐱 发 布</button>
      </div>
    </div>
    <div class="topic-tags">
      <span class="topic-tag active" data-topic="all" onclick="switchTopic(this)">🌐 全部</span>
      <span class="topic-tag" data-topic="daily" onclick="switchTopic(this)">☀️ 日常晒猫</span>
      <span class="topic-tag" data-topic="funny" onclick="switchTopic(this)">😂 搞笑瞬间</span>
      <span class="topic-tag" data-topic="health" onclick="switchTopic(this)">🏥 养猫科普</span>
      <span class="topic-tag" data-topic="ask" onclick="switchTopic(this)">❓ 求助问答</span>
    </div>
    <div class="feed" id="feedContainer">
      <div class="loading-spinner" id="loading"><span class="spin">🐱</span> 加载中…</div>
    </div>
    <div style="text-align:center;padding:32px 0 16px;color:var(--brown-light);font-size:0.8rem;border-top:1px solid #f0d5c8;margin-top:24px;">
      🐾 云喵圈子 · 所有人都是猫猫教的<br>Made with 💗 for all 铲屎官
    </div>
  </div>
  <script>
    // ===== Supabase REST API (no CDN needed) =====
    const SUPABASE_URL = 'https://uvonaehwgylezomtdyxi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2b25hZWh3Z3lsZXpvbXRkeXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzk1ODAsImV4cCI6MjA5NjYxNTU4MH0.F7hGSNSOCXS8Iw_3E6zZKxNfnPwWp69no6M1xtqFWlo';
    const apiHeaders = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
    const api = {
      select: async (table, opts = {}) => { const params = new URLSearchParams(); params.set('select', '*'); if (opts.order) params.set('order', opts.order); if (opts.limit) params.set('limit', opts.limit); const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + params, { headers: apiHeaders }); if (!r.ok) throw new Error(await r.text()); return r.json(); },
      insert: async (table, data) => { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table, { method: 'POST', headers: apiHeaders, body: JSON.stringify(data) }); if (!r.ok) throw new Error(await r.text()); return r.json(); },
      update: async (table, id, data) => { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + id, { method: 'PATCH', headers: apiHeaders, body: JSON.stringify(data) }); if (!r.ok) throw new Error(await r.text()); return r.json(); },
      delete: async (table, id) => { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + id, { method: 'DELETE', headers: apiHeaders }); if (!r.ok) throw new Error(await r.text()); return true; }
    };

    // ===== State =====
    let currentTopic = 'all';
    let posts = [];
    let isAdmin = localStorage.getItem('yunmiao_admin') === 'true';
    let adminClickCount = 0;
    const randomAvatars = ['😺','😸','😻','😼','😽','🙀','😿','😹','🐱','🐈','🐾','🐟'];
    const randomNames = ['橘子味の猫','胖橘饲养员','布偶控小七','猫饼投喂机','铲屎大将军','罐头开罐器','猫毛收集者','深夜吸猫人','猫薄荷成瘾','喵星特派员','云养猫冠军','逗猫棒终结者','猫罐头鉴定师','小鱼干守护者','猫窝质检员','撸猫专业户'];
    const colors = ['#a8e6cf','#f7c6d6','#b8d4f0','#ffe0b2','#c8e6c9','#f0d5c8','#e1bee7','#b2dfdb','#ffccbc','#d1c4e9'];

    function getMyName() {
      let name = localStorage.getItem('yunmiao_nickname');
      if (!name) {
        name = randomNames[Math.floor(Math.random() * randomNames.length)];
        localStorage.setItem('yunmiao_nickname', name);
      }
      return name;
    }
    function getMyAvatar() {
      let av = localStorage.getItem('yunmiao_avatar');
      if (!av) {
        av = randomAvatars[Math.floor(Math.random() * randomAvatars.length)];
        localStorage.setItem('yunmiao_avatar', av);
      }
      return av;
    }

    // ===== Toast =====
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._hide);
      el._hide = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ===== Load Posts =====
    async function loadPosts() {
      try {
        const data = await api.select('posts', { order: 'created_at.desc', limit: 50 });
        posts = data || [];
        renderPosts();
      } catch(e) {
        console.error('Load error:', e);
        document.getElementById('loading').innerHTML = '😿 加载失败: ' + e.message;
      }
    }

    // ===== Render Posts =====
    function renderPosts() {
      const container = document.getElementById('feedContainer');
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';

      const filtered = currentTopic === 'all' ? posts : posts.filter(p => p.topic === currentTopic);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="loading-spinner">
            <div style="font-size:4rem;margin-bottom:12px">🐾</div>
            <p style="color:var(--brown-light)">还没有帖子，快来发第一条吧！</p>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(post => {
        const time = new Date(post.created_at);
        const timeStr = time.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        const avatar = post.avatar || '😺';
        const author = post.author_name || '匿名喵友';
        const likes = post.likes || 0;
        const color = post.color || '#a8e6cf';
        const content = (post.content || '').replace(/\n/g, '<br>');

        return `
          <div class="post-card" data-post-id="${post.id}">
            <div class="post-header">
              <div class="post-avatar" style="background:linear-gradient(135deg,${color},#fce4ec)">${avatar}</div>
              <span class="post-author">${author}</span>
              <div class="post-header-right">
                <span class="post-time">${timeStr}</span>
                ${author === getMyName() || isAdmin ? `<button class="delete-btn" onclick="deletePost('${post.id}')" title="${isAdmin ? '管理员删除' : '删除我的帖子'}">✕</button>` : ''}
              </div>
            </div>
            <div class="post-content">${content}</div>
            <div class="post-actions">
              <button onclick="toggleLike('${post.id}')">
                <span class="icon">${post.liked ? '❤️' : '🤍'}</span>
                <span>${likes}</span>
              </button>
              <button><span class="icon">💬</span><span>0</span></button>
            </div>
          </div>`;
      }).join('');
    }

    // ===== Publish Post =====
    async function publishPost() {
      const input = document.getElementById('postInput');
      const text = input.value.trim();
      if (!text) { toast('🐱 写点啥再发呀～'); return; }

      const btn = document.querySelector('.publish-btn');
      btn.disabled = true;
      btn.textContent = '⏳ 发布中...';
      document.getElementById('publishStatus').textContent = '正在保存...';

      // Set nickname
      const nickInput = document.getElementById('nicknameInput');
      if (nickInput.value.trim()) {
        localStorage.setItem('yunmiao_nickname', nickInput.value.trim());
      }

      const myName = getMyName();
      const myAv = getMyAvatar();
      const myColor = colors[Math.floor(Math.random() * colors.length)];

      try {
        await api.insert('posts', {
          content: text,
          author_name: myName,
          avatar: myAv,
          color: myColor,
          topic: currentTopic === 'all' ? 'daily' : currentTopic,
          likes: 0
        });

        input.value = '';
        toast('🐱 发布成功！喵友们都看到啦 ✨');
        await loadPosts();
      } catch(e) {
        toast('😿 发布失败: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🐱 发 布';
        document.getElementById('publishStatus').textContent = '';
      }
    }

    // ===== Delete Post =====
    async function deletePost(postId) {
      if (!confirm('确定要删除这条帖子吗？😿')) return;
      try {
        await api.delete('posts', postId);
        toast('🗑️ 已删除');
        await loadPosts();
      } catch(e) {
        toast('😿 删除失败: ' + e.message);
      }
    }

    // ===== Like =====
    async function toggleLike(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;

      const newLikes = (post.likes || 0) + (post.liked ? -1 : 1);
      post.liked = !post.liked;
      post.likes = newLikes;

      try {
        await api.update('posts', postId, { likes: newLikes });
        renderPosts();
      } catch(e) {
        post.likes = (post.likes || 0) + (post.liked ? -1 : 1);
        post.liked = !post.liked;
        toast('😿 操作失败');
        renderPosts();
      }
    }

    // ===== Topic Filter =====
    function switchTopic(el) {
      document.querySelectorAll('.topic-tag').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTopic = el.dataset.topic;
      renderPosts();
    }

    // ===== Simple polling for realtime (no WebSocket needed) =====
    function setupRealtime() {
      setInterval(loadPosts, 10000);
    }

    // ===== Stats update =====
    function updateStats() {
      document.getElementById('postCount').textContent = posts.length;
    }

    // ===== Init =====
    function toggleAdmin() {
      isAdmin = !isAdmin;
      localStorage.setItem('yunmiao_admin', isAdmin);
      toast(isAdmin ? '🔑 管理员模式已开启' : '👋 已退出管理员模式');
      renderPosts();
    }

    // Hidden admin activation: click title 5 times
    document.querySelector('header h1').addEventListener('click', () => {
      adminClickCount++;
      if (adminClickCount >= 5) {
        adminClickCount = 0;
        const pwd = prompt('🔑 输入管理员密码：');
        if (pwd === 'YunMiao2026') {
          toggleAdmin();
        } else if (pwd !== null) {
          toast('❌ 密码错误');
        }
      }
      setTimeout(() => adminClickCount = 0, 3000);
    });

    // Show admin badge if in admin mode
    function renderAdminBadge() {
      const title = document.querySelector('header h1');
      if (isAdmin && !document.querySelector('.admin-badge')) {
        const badge = document.createElement('span');
        badge.className = 'admin-badge';
        badge.textContent = ' 🔑管理员';
        badge.style.cssText = 'font-size:0.7rem;color:var(--pink-dark);vertical-align:middle;cursor:pointer;';
        badge.onclick = toggleAdmin;
        title.appendChild(badge);
      } else if (!isAdmin) {
        const badge = document.querySelector('.admin-badge');
        if (badge) badge.remove();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Set my avatar
      document.getElementById('myAvatar').textContent = getMyAvatar();
      // Set nickname input placeholder
      document.getElementById('nicknameInput').placeholder = '你的喵名（当前: ' + getMyName() + '）';
      // Load posts
      loadPosts();
      setupRealtime();
      if (isAdmin) renderAdminBadge();
      // Auto-refresh stats
      setInterval(updateStats, 15000);
      updateStats();
    });

    // Ctrl+Enter shortcut
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) publishPost();
    });

    // Update nickname display
    document.getElementById('nicknameInput').addEventListener('input', function() {
      if (this.value.trim()) {
        this.placeholder = '你的喵名';
      } else {
        this.placeholder = '你的喵名（当前: ' + getMyName() + '）';
      }
    });
  </script>
</body>
</html>
