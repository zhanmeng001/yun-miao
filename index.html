<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ 戰盟圈子 — 戰友的聚集地</title>
  
  <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Serif SC', 'STSong', 'SimSun', 'PingFang SC', serif;
      background: #1a1008;
      color: #d4c5a9;
      line-height: 1.7;
      overflow-x: hidden;
    }
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d48b;
      --red: #8b1a1a;
      --red-dark: #5c0e0e;
      --dark: #1a1008;
      --dark2: #2a1a0e;
      --parchment: #f5e6d0;
      --text: #d4c5a9;
      --text-light: #a08860;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
      --radius: 12px;
      --border-gold: 1px solid rgba(201,168,76,0.25);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 40px,
        rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px
      );
      pointer-events: none; z-index: 0;
    }

    /* ===== Floating War Decorations ===== */
    .floating-decorations { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .floating-decorations span {
      position: absolute; font-size: 2rem; opacity: 0.06;
      animation: floatItem 25s ease-in-out infinite;
    }
    .floating-decorations span:nth-child(1) { top:8%; left:5%; animation-delay:0s; }
    .floating-decorations span:nth-child(2) { top:35%; right:6%; animation-delay:-6s; font-size:2.8rem; }
    .floating-decorations span:nth-child(3) { top:65%; left:10%; animation-delay:-12s; }
    .floating-decorations span:nth-child(4) { bottom:12%; right:12%; animation-delay:-18s; }
    .floating-decorations span:nth-child(5) { top:20%; left:55%; animation-delay:-8s; font-size:1.8rem; }
    .floating-decorations span:nth-child(6) { bottom:35%; left:40%; animation-delay:-14s; font-size:2.2rem; }
    .floating-decorations span:nth-child(7) { top:50%; left:75%; animation-delay:-4s; }
    .floating-decorations span:nth-child(8) { bottom:5%; left:80%; animation-delay:-20s; font-size:1.6rem; }
    @keyframes floatItem { 0%,100%{transform:translateY(0)rotate(0deg)} 25%{transform:translateY(-18px)rotate(4deg)} 50%{transform:translateY(-8px)rotate(-3deg)} 75%{transform:translateY(-22px)rotate(2deg)} }

    .app-wrapper { position:relative; z-index:1; max-width:780px; margin:0 auto; padding:0 16px 80px; }

    /* ===== Header ===== */
    header {
      padding: 36px 0 20px;
      text-align: center;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 80px; height: 2px;
      background: linear-gradient(90deg,transparent,var(--gold),transparent);
      margin: 16px auto 0;
    }
    header .emblem { font-size: 2.6rem; display:block; margin-bottom:4px; filter: drop-shadow(0 0 10px rgba(201,168,76,0.3)); }
    header h1 {
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(201,168,76,0.15);
      font-weight: 700;
    }
    header h1 .admin-badge { font-size:0.7rem; color:var(--gold); vertical-align:middle; cursor:pointer; letter-spacing:1px; }
    header .subtitle {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-top: 8px;
      letter-spacing: 3px;
    }

    /* ===== Stats Bar ===== */
    .stats-bar {
      display: flex;
      justify-content: space-around;
      background: linear-gradient(135deg, rgba(42,26,14,0.9), rgba(26,16,8,0.95));
      border: var(--border-gold);
      border-radius: var(--radius);
      padding: 14px 8px;
      margin: 16px 0 20px;
    }
    .stats-bar .stat { text-align:center; flex:1; }
    .stats-bar .stat .num { font-size:1.2rem; font-weight:700; color:var(--gold); }
    .stats-bar .stat .label { font-size:0.72rem; color:var(--text-light); margin-top:2px; letter-spacing:1px; }

    /* ===== Publish Box ===== */
    .publish-box {
      background: linear-gradient(135deg, rgba(42,26,14,0.9), rgba(26,16,8,0.95));
      border: var(--border-gold);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }
    .publish-box .publish-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .publish-box .avatar {
      width:40px; height:40px; border-radius:50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; flex-shrink:0;
      border: 1px solid rgba(201,168,76,0.3);
      overflow:hidden;
    }
    .publish-box .avatar img { width:100%; height:100%; object-fit:cover; }
    .wechat-login-btn {
      background: none; border: 1px solid rgba(201,168,76,0.2); border-radius:6px;
      color: var(--text-light); font-size:0.7rem; cursor:pointer;
      padding:3px 10px; transition:all 0.15s; font-family:inherit; letter-spacing:1px;
      white-space:nowrap;
    }
    .wechat-login-btn:hover { border-color:rgba(201,168,76,0.4); color:var(--gold); }
    .publish-header { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .publish-box textarea {
      flex:1; border: var(--border-gold); background: rgba(0,0,0,0.3);
      border-radius:10px; padding:10px 14px; font-size:0.9rem;
      resize:none; height:44px; font-family:inherit; color:var(--text);
      outline: none; transition: border-color 0.2s,height 0.2s;
    }
    .publish-box textarea:focus { border-color:var(--gold); height:70px; }
    .publish-box textarea::placeholder { color:rgba(212,197,169,0.3); }
    .publish-actions { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
    .publish-actions .status { font-size:0.75rem; color:var(--text-light); }
    .publish-btn {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: var(--gold); border: 1px solid rgba(201,168,76,0.3);
      border-radius:8px; padding:8px 24px; font-size:0.85rem;
      cursor:pointer; transition:all 0.2s; font-weight:600;
      font-family:inherit; letter-spacing:2px;
    }
    .publish-btn:hover { background: var(--red); border-color:var(--gold); box-shadow:0 0 15px rgba(201,168,76,0.15); }
    .publish-btn:active { transform:scale(0.97); }

    /* ===== Tabs ===== */
    .tabs {
      display:flex; gap:4px; margin-bottom:16px;
      background: rgba(42,26,14,0.9); border: var(--border-gold);
      border-radius: var(--radius); padding:4px;
    }
    .tabs button {
      flex:1; border:none; background:transparent; padding:10px 0;
      border-radius:8px; font-size:0.82rem; font-weight:600;
      color: var(--text-light); cursor:pointer; transition:all 0.2s;
      font-family:inherit; letter-spacing:1px;
    }
    .tabs button.active {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: var(--gold); box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    .tabs button:not(.active):hover { background: rgba(201,168,76,0.08); }

    /* ===== Feed ===== */
    .feed { display:flex; flex-direction:column; gap:14px; }

    .post-card {
      background: linear-gradient(135deg, rgba(42,26,14,0.85), rgba(26,16,8,0.9));
      border: var(--border-gold);
      border-radius: var(--radius);
      padding: 16px;
      transition: all 0.2s;
    }
    .post-card:hover {
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 0 20px rgba(201,168,76,0.05);
    }
    .post-card .post-header { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .post-card .post-avatar {
      width:38px; height:38px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.2rem; flex-shrink:0;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .post-card .post-author { font-weight:700; font-size:0.88rem; color:var(--gold-light); }
    .post-card .post-time { font-size:0.7rem; color:var(--text-light); }
    .post-card .post-header-right { display:flex; align-items:center; gap:6px; margin-left:auto; }
    .post-card .post-content {
      font-size:0.92rem; margin-bottom:8px; line-height:1.8;
      color: var(--text); letter-spacing:0.5px;
    }
    .post-card .post-actions {
      display:flex; gap:20px; padding-top:8px;
      border-top: 1px solid rgba(201,168,76,0.12);
    }
    .post-card .post-actions button {
      background:none; border:none; cursor:pointer;
      font-size:0.8rem; color:var(--text-light);
      display:flex; align-items:center; gap:4px;
      padding:4px 8px; border-radius:6px; transition:all 0.15s;
      font-family:inherit;
    }
    .post-card .post-actions button:hover { background:rgba(201,168,76,0.08); color:var(--gold); }
    .post-card .post-actions button.liked { color:var(--red); font-weight:600; }
    .post-card .post-actions button .icon { font-size:1rem; }

    /* ===== Topic Tags ===== */
    .topic-tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .topic-tag {
      background: rgba(42,26,14,0.8); border: 1px solid rgba(201,168,76,0.15);
      border-radius:6px; padding:6px 14px; font-size:0.78rem;
      cursor:pointer; transition:all 0.15s; color:var(--text-light);
      font-weight:500; letter-spacing:1px;
    }
    .topic-tag:hover, .topic-tag.active {
      background: rgba(139,26,26,0.6); color:var(--gold);
      border-color:rgba(201,168,76,0.3);
    }

    /* ===== Delete button ===== */
    .delete-btn {
      background:none; border:none; cursor:pointer;
      font-size:0.75rem; color:rgba(212,197,169,0.2);
      padding:2px 6px; border-radius:4px;
      transition:all 0.15s; flex-shrink:0;
    }
    .delete-btn:hover { color:var(--red); background:rgba(139,26,26,0.15); }

    /* ===== Toast ===== */
    .toast {
      position:fixed; bottom:80px; left:50%;
      transform:translateX(-50%)translateY(100px);
      background: rgba(26,16,8,0.95); color:var(--gold);
      padding:10px 24px; border-radius:8px; font-size:0.82rem;
      opacity:0; transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none; z-index:100; white-space:nowrap;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .toast.show { opacity:1; transform:translateX(-50%)translateY(0); }

    /* ===== Loading ===== */
    .loading-spinner { text-align:center; padding:40px 20px; color:var(--text-light); }
    .loading-spinner .spin { display:inline-block; animation:spin 1s linear infinite; font-size:1.3rem; }
    @keyframes spin { 100%{transform:rotate(360deg)} }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--dark); }
    ::-webkit-scrollbar-thumb { background:var(--gold); border-radius:3px; opacity:0.5; }

    /* ===== Nickname Input ===== */
    .nickname-input { display:flex; gap:8px; margin-bottom:10px; }
    .nickname-input input {
      flex:1; border: var(--border-gold); background:rgba(0,0,0,0.3);
      border-radius:8px; padding:8px 14px; font-size:0.82rem;
      font-family:inherit; color:var(--text); outline:none;
    }
    .nickname-input input:focus { border-color:var(--gold); }
    .nickname-input input::placeholder { color:rgba(212,197,169,0.25); }

    /* ===== Responsive ===== */
    @media (max-width:500px) {
      header h1 { font-size:1.5rem; }
      .floating-decorations span { font-size:1.5rem!important; }
      .stats-bar .stat .num { font-size:1rem; }
    }

    /* ===== Footer ===== */
    .footer {
      text-align:center; padding:32px 0 16px;
      color:var(--text-light); font-size:0.75rem;
      border-top:1px solid rgba(201,168,76,0.1); margin-top:24px;
      letter-spacing:1px;
    }</style>
</head>
<body>
<div class="floating-decorations">
    <span>⚔️</span><span>🏯</span><span>🐎</span><span>🏹</span><span>🗡️</span><span>🛡️</span><span>🚩</span><span>🏴</span>
  </div>
  <div class="toast" id="toast"></div>
  <div class="app-wrapper">
    <header>
      <span class="emblem">⚔️</span>
      <h1>⚔️ 戰盟圈子</h1>
      <p class="subtitle">🔥 戰盟風雲 · 兄弟齊心 · 其利斷金</p>
    </header>
    <div class="stats-bar">
      <div class="stat"><div class="num" id="memberCount">⚔️</div><div class="label">戰友</div></div>
      <div class="stat"><div class="num" id="postCount">📝</div><div class="label">帖子</div></div>
      <div class="stat"><div class="num">11</div><div class="label">🏯 赛季</div></div>
      <div class="stat"><div class="num" id="catCount">🐾</div><div class="label">圈子成员</div></div>
    </div>
    <div class="publish-box">
      <div class="nickname-input">
        <input id="nicknameInput" placeholder="你的稱號（可选）" maxlength="10">
      </div>
      <div class="publish-header">
        <div class="avatar" id="myAvatar">😺</div>
        <textarea id="postInput" placeholder="發布征戰心得、戰報分享… ⚔️"></textarea>
        <button class="wechat-login-btn" id="wechatLoginBtn" onclick="wechatLogin()" title="使用微信登录自動獲取昵稱和頭像">💬 微信登录</button>
      </div>
      <div class="publish-actions">
        <div id="publishStatus" class="status"></div>
        <button class="publish-btn" onclick="publishPost()">⚔️ 發 布</button>
      </div>
    </div>
    <div class="topic-tags">
      <span class="topic-tag active" data-topic="all" onclick="switchTopic(this)">🏯 全部</span>
      <span class="topic-tag" data-topic="daily" onclick="switchTopic(this)">⚔️ 配將討論</span>
      <span class="topic-tag" data-topic="funny" onclick="switchTopic(this)">🎯 戰報分享</span>
      <span class="topic-tag" data-topic="health" onclick="switchTopic(this)">📖 攻略心得</span>
      <span class="topic-tag" data-topic="ask" onclick="switchTopic(this)">❓ 求助問答</span>
    </div>
    <div class="feed" id="feedContainer">
      <div class="loading-spinner" id="loading"><span class="spin">⚔️</span> 加载軍情…</div>
    </div>
    <div class="footer">
      🏯 戰盟風雲 · 兄弟齊心 · 其利斷金<br>⚔️ 三戰同好聚集地
    </div>
  </div>
  <script>
    // ===== Supabase REST API (no CDN needed) =====
    const SUPABASE_URL = 'https://uvonaehwgylezomtdyxi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2b25hZWh3Z3lsZXpvbXRkeXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzk1ODAsImV4cCI6MjA5NjYxNTU4MH0.F7hGSNSOCXS8Iw_3E6zZKxNfnPwWp69no6M1xtqFWlo';
    const apiHeaders = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
    const api = {
      select: async (table, opts = {}) => { const params = new URLSearchParams(); params.set('select', '*'); if (opts.order) params.set('order', opts.order); if (opts.limit) params.set('limit', opts.limit); const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?' + params, { headers: apiHeaders }); if (!r.ok) throw new Error(await r.text()); return r.json(); },
      insert: async (table, data) => { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table, { method: 'POST', headers: apiHeaders, body: JSON.stringify(data) }); if (!r.ok) throw new Error(await r.text()); return r.json(); },
      update: async (table, id, data) => { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + id, { method: 'PATCH', headers: apiHeaders, body: JSON.stringify(data) }); if (!r.ok) throw new Error(await r.text()); return r.json(); },
      delete: async (table, id) => { const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + '?id=eq.' + id, { method: 'DELETE', headers: apiHeaders }); if (!r.ok) throw new Error(await r.text()); return true; }
    };

    // ===== State =====
    let currentTopic = 'all';
    let posts = [];
    let isAdmin = localStorage.getItem('yunmiao_admin') === 'true';
    let adminClickCount = 0;
    // ===== WeChat Login =====
    function wechatLogin() {
      window.location.href = 'https://quiet-glasses-judge.loca.lt/auth';
    }

    // ===== Handle OAuth callback: auto-fill nickname & avatar =====
    const urlParams = new URLSearchParams(window.location.search);
    const nameFromUrl = urlParams.get('name') || urlParams.get('nickname');
    const avatarFromUrl = urlParams.get('avatar');
    if (nameFromUrl) {
      localStorage.setItem('yunmiao_nickname', decodeURIComponent(nameFromUrl));
    }
    if (avatarFromUrl) {
      localStorage.setItem('yunmiao_avatar_url', decodeURIComponent(avatarFromUrl));
    }
    // Clean URL params (remove them from address bar)
    if (nameFromUrl || avatarFromUrl) {
      window.history.replaceState({}, '', window.location.pathname);
    }

    const randomAvatars = ['😺','😸','😻','😼','😽','🙀','😿','😹','🐱','🐈','🐾','🐟'];
    const randomNames = ['橘子味の猫','胖橘饲养员','布偶控小七','猫饼投喂机','铲屎大将军','罐头开罐器','猫毛收集者','深夜吸猫人','猫薄荷成瘾','喵星特派员','云养猫冠军','逗猫棒终结者','猫罐头鉴定师','小鱼干守护者','猫窝质检员','撸猫专业户'];
    const colors = ['#a8e6cf','#f7c6d6','#b8d4f0','#ffe0b2','#c8e6c9','#f0d5c8','#e1bee7','#b2dfdb','#ffccbc','#d1c4e9'];

    function getMyName() {
      let name = localStorage.getItem('yunmiao_nickname');
      if (!name) {
        name = randomNames[Math.floor(Math.random() * randomNames.length)];
        localStorage.setItem('yunmiao_nickname', name);
      }
      return name;
    }
    function getMyAvatar() {
      // Check if user has a custom avatar from WeChat
      const wechatAvatar = localStorage.getItem('yunmiao_avatar_url');
      if (wechatAvatar) return wechatAvatar;
      // Fallback to random emoji
      let av = localStorage.getItem('yunmiao_avatar');
      if (!av) {
        av = randomAvatars[Math.floor(Math.random() * randomAvatars.length)];
        localStorage.setItem('yunmiao_avatar', av);
      }
      return av;
    }

    // ===== Toast =====
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._hide);
      el._hide = setTimeout(() => el.classList.remove('show'), 2000);
    }

    // ===== Load Posts =====
    async function loadPosts() {
      try {
        const data = await api.select('posts', { order: 'created_at.desc', limit: 50 });
        posts = data || [];
        renderPosts();
      } catch(e) {
        console.error('Load error:', e);
        document.getElementById('loading').innerHTML = '😿 加载失败: ' + e.message;
      }
    }

    // ===== Render Posts =====
    function renderPosts() {
      const container = document.getElementById('feedContainer');
      const loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';

      const filtered = currentTopic === 'all' ? posts : posts.filter(p => p.topic === currentTopic);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="loading-spinner">
            <div style="font-size:4rem;margin-bottom:12px">🐾</div>
            <p style="color:var(--brown-light)">暫無軍報，快來發布第一條！</p>
          </div>`;
        return;
      }

      container.innerHTML = filtered.map(post => {
        const time = new Date(post.created_at);
        const timeStr = time.toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        const avatar = post.avatar || '😺';
        const author = post.author_name || '匿名戰友';
        const likes = post.likes || 0;
        const color = post.color || '#a8e6cf';
        const content = (post.content || '').replace(/\n/g, '<br>');

        return `
          <div class="post-card" data-post-id="${post.id}">
            <div class="post-header">
              <div class="post-avatar" style="background:linear-gradient(135deg,${color},#fce4ec)">${avatar}</div>
              <span class="post-author">${author}</span>
              <div class="post-header-right">
                <span class="post-time">${timeStr}</span>
                ${author === getMyName() || isAdmin ? `<button class="delete-btn" onclick="deletePost('${post.id}')" title="${isAdmin ? '管理员删除' : '删除我的帖子'}">✕</button>` : ''}
              </div>
            </div>
            <div class="post-content">${content}</div>
            <div class="post-actions">
              <button onclick="toggleLike('${post.id}')">
                <span class="icon">${post.liked ? '❤️' : '🤍'}</span>
                <span>${likes}</span>
              </button>
              <button><span class="icon">💬</span><span>0</span></button>
            </div>
          </div>`;
      }).join('');
    }

    // ===== Publish Post =====
    async function publishPost() {
      const input = document.getElementById('postInput');
      const text = input.value.trim();
      if (!text) { toast('🐱 写点啥再发呀～'); return; }

      const btn = document.querySelector('.publish-btn');
      btn.disabled = true;
      btn.textContent = '⏳ 发布中...';
      document.getElementById('publishStatus').textContent = '正在保存...';

      // Set nickname
      const nickInput = document.getElementById('nicknameInput');
      if (nickInput.value.trim()) {
        localStorage.setItem('yunmiao_nickname', nickInput.value.trim());
      }

      const myName = getMyName();
      const myAv = getMyAvatar();
      const myColor = colors[Math.floor(Math.random() * colors.length)];

      try {
        await api.insert('posts', {
          content: text,
          author_name: myName,
          avatar: myAv,
          color: myColor,
          topic: currentTopic === 'all' ? 'daily' : currentTopic,
          likes: 0
        });

        input.value = '';
        toast('⚔️ 軍報已發！全盟皆知 ✨');
        await loadPosts();
      } catch(e) {
        toast('😿 发布失败: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '⚔️ 發 布';
        document.getElementById('publishStatus').textContent = '';
      }
    }

    // ===== Delete Post =====
    async function deletePost(postId) {
      if (!confirm('确定要删除这条帖子吗？😿')) return;
      try {
        await api.delete('posts', postId);
        toast('🗑️ 已删除');
        await loadPosts();
      } catch(e) {
        toast('😿 删除失败: ' + e.message);
      }
    }

    // ===== Like =====
    async function toggleLike(postId) {
      const post = posts.find(p => p.id === postId);
      if (!post) return;

      const newLikes = (post.likes || 0) + (post.liked ? -1 : 1);
      post.liked = !post.liked;
      post.likes = newLikes;

      try {
        await api.update('posts', postId, { likes: newLikes });
        renderPosts();
      } catch(e) {
        post.likes = (post.likes || 0) + (post.liked ? -1 : 1);
        post.liked = !post.liked;
        toast('😿 操作失败');
        renderPosts();
      }
    }

    // ===== Topic Filter =====
    function switchTopic(el) {
      document.querySelectorAll('.topic-tag').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTopic = el.dataset.topic;
      renderPosts();
    }

    // ===== Simple polling for realtime (no WebSocket needed) =====
    function setupRealtime() {
      setInterval(loadPosts, 10000);
    }

    // ===== Stats update =====
    function updateStats() {
      document.getElementById('postCount').textContent = posts.length;
    }

    // ===== Init =====
    function toggleAdmin() {
      isAdmin = !isAdmin;
      localStorage.setItem('yunmiao_admin', isAdmin);
      toast(isAdmin ? '🔑 管理员模式已开启' : '👋 已退出管理员模式');
      renderPosts();
    }

    // Hidden admin activation: click title 5 times
    document.querySelector('header h1').addEventListener('click', () => {
      adminClickCount++;
      if (adminClickCount >= 5) {
        adminClickCount = 0;
        const pwd = prompt('🔑 输入管理员密码：');
        if (pwd === 'YunMiao2026') {
          toggleAdmin();

        } else if (pwd !== null) {
          toast('❌ 密码错误');
        }
      }
      setTimeout(() => adminClickCount = 0, 3000);
    });

    // Show admin badge if in admin mode
    function renderAdminBadge() {
      const title = document.querySelector('header h1');
      if (isAdmin && !document.querySelector('.admin-badge')) {
        const badge = document.createElement('span');
        badge.className = 'admin-badge';
        badge.textContent = ' 🔑管理员';
        badge.style.cssText = 'font-size:0.7rem;color:var(--pink-dark);vertical-align:middle;cursor:pointer;';
        badge.onclick = toggleAdmin;
        title.appendChild(badge);
      } else if (!isAdmin) {
        const badge = document.querySelector('.admin-badge');
        if (badge) badge.remove();
      }
    }

    // ===== App Init (called after access granted) =====
    function initApp() {
      // Set my avatar
      const myAv = getMyAvatar();
      const avatarEl = document.getElementById('myAvatar');
      if (myAv.startsWith('http')) {
        avatarEl.innerHTML = '<img src="' + myAv + '" alt="avatar">';
      } else {
        avatarEl.textContent = myAv;
      }
      // Set nickname input placeholder
      document.getElementById('nicknameInput').placeholder = '你的名字（當前: ' + getMyName() + '）';
      // Load posts
      loadPosts();
      setupRealtime();
      if (isAdmin) renderAdminBadge();
      // Auto-refresh stats
      setInterval(updateStats, 15000);
      updateStats();
    }

    document.addEventListener('DOMContentLoaded', initApp);

    // Ctrl+Enter shortcut
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) publishPost();
    });

    // Save nickname immediately on blur
    document.getElementById('nicknameInput').addEventListener('blur', function() {
      if (this.value.trim()) {
        localStorage.setItem('yunmiao_nickname', this.value.trim());
        toast('✅ 昵称已改为: ' + this.value.trim());
      }
    });
    // Allow pressing Enter to save nickname
    document.getElementById('nicknameInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        this.blur();
      }
    });
    // Update placeholder as user types
    document.getElementById('nicknameInput').addEventListener('input', function() {
      if (this.value.trim()) {
        this.placeholder = '输入完点其他地方或按回车保存';
      } else {
        this.placeholder = '你的喵名（当前: ' + getMyName() + '）';
      }
    });
  </script>
</body>
</html>
